services:
  mysql:
    image: mysql:8.4
    container_name: profitai_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: profitai_dev_password
      MYSQL_DATABASE: profitai
    ports:
      - "3306:3306"
    command: --defaults-extra-file=/etc/mysql/conf.d/profitai.cnf
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
      - ./mysql/my.ini:/etc/mysql/conf.d/profitai.cnf:ro
